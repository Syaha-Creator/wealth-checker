services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — database utama
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: wealth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wealth_checker}
      POSTGRES_USER: ${POSTGRES_USER:-wealth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - wealth_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wealth} -d ${POSTGRES_DB:-wealth_checker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wealth_network
    deploy:
      resources:
        limits:
          memory: 256m

  # ---------------------------------------------------------------------------
  # Redis — cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: wealth_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --appendonly yes
      --maxmemory 48mb
      --maxmemory-policy allkeys-lru
    volumes:
      - wealth_redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wealth_network
    deploy:
      resources:
        limits:
          memory: 64m

  # ---------------------------------------------------------------------------
  # API — Hono.js on Bun
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: wealth_api
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3011"
      DATABASE_URL: postgresql://${POSTGRES_USER:-wealth}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wealth_checker}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "3011:3011"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wealth_network
    deploy:
      resources:
        limits:
          memory: 256m

  # ---------------------------------------------------------------------------
  # Web — Next.js
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: wealth_web
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3010"
      INTERNAL_API_URL: http://api:3011
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3011}
    ports:
      - "3010:3010"
    depends_on:
      - api
    networks:
      - wealth_network
    deploy:
      resources:
        limits:
          memory: 384m

volumes:
  wealth_postgres_data:
    driver: local
  wealth_redis_data:
    driver: local

networks:
  wealth_network:
    driver: bridge
