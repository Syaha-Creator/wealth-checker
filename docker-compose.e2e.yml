# E2E testing services — runs on separate ports to avoid conflicts with production stack.
# Postgres uses tmpfs (in-memory) so it starts fresh on every run with no leftover state.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up -d --build
#   # Run migrations, then Playwright tests against http://localhost:4000
#   docker compose -f docker-compose.e2e.yml down -v

services:
  # ─── Isolated PostgreSQL (in-memory, ephemeral) ──────────────────────────
  postgres-e2e:
    image: postgres:17-alpine
    container_name: wealth_postgres_e2e
    environment:
      POSTGRES_DB: wealth_checker_e2e
      POSTGRES_USER: wealth
      POSTGRES_PASSWORD: wealth_e2e_pass
    ports:
      - "5440:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealth -d wealth_checker_e2e"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wealth_e2e_network

  # ─── API (port 4001) ──────────────────────────────────────────────────────
  api-e2e:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: wealth_api_e2e
    environment:
      PORT: "4001"
      DATABASE_URL: postgresql://wealth:wealth_e2e_pass@postgres-e2e:5432/wealth_checker_e2e
      BETTER_AUTH_SECRET: e2e-test-secret-minimum-32-characters!!
      BETTER_AUTH_URL: http://localhost:4001
      # web-e2e's browser-facing origin — required so better-auth's trustedOrigins
      # and the API's CORS allow-list accept requests from the E2E web app
      ADDITIONAL_TRUSTED_ORIGINS: http://localhost:4000
    ports:
      - "4001:4001"
    depends_on:
      postgres-e2e:
        condition: service_healthy
    networks:
      - wealth_e2e_network

  # ─── Web / Next.js (port 4000) ────────────────────────────────────────────
  web-e2e:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: wealth_web_e2e
    environment:
      PORT: "4000"
      NEXT_PUBLIC_API_URL: http://localhost:4001
      INTERNAL_API_URL: http://api-e2e:4001
    ports:
      - "4000:4000"
    depends_on:
      - api-e2e
    networks:
      - wealth_e2e_network

networks:
  wealth_e2e_network:
    driver: bridge
