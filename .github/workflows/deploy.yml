# =============================================================================
# Wealth Checker — CI/CD Pipeline
# Self-hosted runner di VPS velrox.cloud
# =============================================================================

name: Wealth Checker — Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ---------------------------------------------------------------------------
# 1 — Quality Gate
# ---------------------------------------------------------------------------
jobs:
  quality-gate:
    name: 🔍 Quality Gate
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build web
        run: bun run build

# ---------------------------------------------------------------------------
# 2 — E2E Tests (main branch only)
# ---------------------------------------------------------------------------
  e2e-test:
    name: 🧪 E2E Tests
    needs: quality-gate
    runs-on: self-hosted
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start E2E services
        run: |
          docker compose -f docker-compose.e2e.yml up -d --build

          echo "Waiting for postgres-e2e..."
          for i in $(seq 1 30); do
            docker compose -f docker-compose.e2e.yml exec -T postgres-e2e \
              pg_isready -U wealth -d wealth_checker_e2e && break
            [ $i -eq 30 ] && echo "postgres-e2e did not start" && exit 1
            sleep 2
          done

          echo "Running migrations on test DB..."
          DATABASE_URL=postgresql://wealth:wealth_e2e_pass@localhost:5440/wealth_checker_e2e \
            bun run db:migrate

          echo "Waiting for api-e2e..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:4001/health > /dev/null && break
            [ $i -eq 30 ] && echo "api-e2e did not respond" && docker compose -f docker-compose.e2e.yml logs api-e2e && exit 1
            sleep 2
          done

          echo "Waiting for web-e2e..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000 > /dev/null && break
            [ $i -eq 30 ] && echo "web-e2e did not respond" && docker compose -f docker-compose.e2e.yml logs web-e2e && exit 1
            sleep 3
          done

      - name: Install Playwright browsers
        working-directory: apps/web
        run: bunx playwright install chromium --with-deps

      - name: Run Playwright E2E
        working-directory: apps/web
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: http://localhost:4000
        run: bunx playwright test --reporter=list

      - name: Teardown E2E services
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

# ---------------------------------------------------------------------------
# 3 — Deploy to Production (main branch only)
# ---------------------------------------------------------------------------
  deploy-production:
    name: 🚀 Deploy to Production
    needs: [quality-gate, e2e-test]
    runs-on: self-hosted
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Deploy
        run: |
          set -euo pipefail
          PROJECT_DIR="/home/velrox/projects/wealth-checker"

          echo "=== [1/6] Sync code ==="
          mkdir -p "$PROJECT_DIR"
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='.next' \
            "$GITHUB_WORKSPACE/" "$PROJECT_DIR/"

          cd "$PROJECT_DIR"

          echo "=== [2/6] Verify .env ==="
          if [ ! -f ".env" ]; then
            echo "⚠️  .env not found — copy it to $PROJECT_DIR/.env on the server first"
            exit 1
          fi
          echo "✅ .env present"

          echo "=== [3/6] Install dependencies ==="
          bun install --frozen-lockfile

          echo "=== [4/6] Build Docker images ==="
          docker compose build --no-cache

          echo "=== [5/6] Start services ==="
          docker compose up -d postgres redis

          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U wealth -d wealth_checker && break
            [ $i -eq 30 ] && echo "PostgreSQL did not start" && exit 1
            sleep 2
          done

          echo "=== [5b/6] Run migrations ==="
          DB_PASS=$(grep '^POSTGRES_PASSWORD=' .env | cut -d= -f2-)
          DATABASE_URL="postgresql://wealth:${DB_PASS}@localhost:5433/wealth_checker" \
            bun run db:migrate

          docker compose up -d api web

          echo "=== [6/6] Health check ==="
          for i in $(seq 1 30); do
            curl -sf http://localhost:3010 > /dev/null && break
            [ $i -eq 30 ] && echo "Health check failed" && exit 1
            sleep 2
          done

          echo ""
          echo "✅ Deployment complete!"
          docker compose ps

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed. Check logs above."
